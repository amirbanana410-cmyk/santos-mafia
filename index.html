<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SANTOS MAFIA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="particles"></div>

<header>
<img class="poster" src="file_00000000afc47246b89e0e770b092c5a.png" alt="Santos Mafia">
<h1>SANTOS MAFIA</h1>

<p>
THE STRONGEST FAMILY IN ONE STATE RP
</p>

<button id="joinBtn">
JOIN THE FAMILY
</button>

</header>


<section id="application" class="hidden">

<h2>
MEMBERSHIP APPLICATION
</h2>

<form id="applyForm">

<input id="name" placeholder="Your Nickname" required>

<input id="age" placeholder="Age" required>

<input id="discord" placeholder="Discord Username" required>

<input id="level" placeholder="Game Level" required>

<input id="ak" placeholder="AK Level" required>


<textarea id="reason" placeholder="Why do you want to join Santos Mafia?"></textarea>


<button class="submit">
SEND APPLICATION
</button>


</form>

</section>


<script src="script.js"></script>

</body>
</html>
